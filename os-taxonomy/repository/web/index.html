<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="中国小学一至六年级交互式课程知识图谱" />
    <title>小数探客 · 知识宇宙</title>
    <link rel="stylesheet" href="styles.css?v=18" />
  </head>
  <body>
    <!-- 登录检测 -->
    <script>
      (function() {
        var token = localStorage.getItem('token');
        if (!token) {
          window.location.replace('/login.html');
          return;
        }
        // 验证 token 有效性
        fetch('/api/me', { headers: { 'Authorization': 'Bearer ' + token } })
          .then(function(r) {
            if (!r.ok) {
              localStorage.removeItem('token');
              localStorage.removeItem('username');
              window.location.replace('/login.html');
            }
          })
          .catch(function() {
            // 网络错误时不强制跳转，允许离线查看
          });
      })();
    </script>

    <div class="app-shell">
      <header class="topbar">
        <a class="brand" href="#" aria-label="小数探课知识宇宙首页">
          <span class="brand-mark" aria-hidden="true"><i></i><i></i><i></i></span>
          <span><strong>小数探客</strong><small>知识宇宙</small></span>
        </a>

        <div class="search-wrap">
          <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m21 21-4.35-4.35m2.1-5.4a7.5 7.5 0 1 1-15 0 7.5 7.5 0 0 1 15 0Z"/></svg>
          <input id="searchInput" type="search" placeholder="搜索知识点，例如：分数、古诗、光……" autocomplete="off" />
          <div id="searchResults" class="search-results" hidden></div>
        </div>

        <div class="user-area" id="userArea">
          <span class="user-name" id="userNameDisplay"></span>
          <span class="remain-badge" id="remainBadge" style="display:none"></span>
          <button id="logoutBtn" class="logout-btn" type="button" title="退出登录">退出</button>
        </div>

        <button id="playPath" class="icon-button" type="button" title="从一年级开始播放" aria-label="从一年级开始播放">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button id="resetView" class="icon-button" type="button" title="重置视角" aria-label="重置视角">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4.8 7.7A8 8 0 1 1 4 13m.8-5.3V3.8m0 3.9h3.9"/></svg>
        </button>
      </header>

      <main class="workspace">
        <section class="graph-stage" aria-label="课程知识图谱">
          <canvas id="graphCanvas"></canvas>

          <div class="filter-bar" aria-label="知识图谱筛选">
            <div class="filter-group" id="gradeFilters">
              <span class="filter-label">年级</span>
              <button class="chip" data-grade="all" type="button">全部</button>
              <button class="chip" data-grade="1-3" type="button">1-3</button>
              <button class="chip" data-grade="1" type="button">一</button>
              <button class="chip" data-grade="2" type="button">二</button>
              <button class="chip" data-grade="3" type="button">三</button>
              <button class="chip" data-grade="4" type="button">四</button>
              <button class="chip" data-grade="5" type="button">五</button>
              <button class="chip" data-grade="6" type="button">六</button>
            </div>
            <div class="divider"></div>
            <label class="select-wrap">
              <span class="sr-only">选择学科</span>
              <select id="subjectFilter">
                <option value="all">全部学科</option>
                <option value="语文">语文</option>
                <option value="数学">数学</option>
                <option value="英语">英语</option>
                <option value="科学">科学</option>
              </select>
              <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m8 10 4 4 4-4"/></svg>
            </label>
          </div>

          <div class="stage-copy">
            <p id="stageEyebrow">中国小学课程 · 试验图谱</p>
            <h1 id="stageTitle">从一个知识点，看见整条学习路径</h1>
            <p id="stageHint">拖拽旋转 · 滚轮缩放 · 点击节点追踪前置与后续</p>
          </div>

          <div class="legend" aria-label="学科图例">
            <strong>学科</strong>
            <button data-subject="语文" type="button"><i style="--dot: var(--chinese)"></i>语文</button>
            <button data-subject="数学" type="button"><i style="--dot: var(--math)"></i>数学</button>
            <button data-subject="英语" type="button"><i style="--dot: var(--english)"></i>英语</button>
            <button data-subject="科学" type="button"><i style="--dot: var(--science)"></i>科学</button>
          </div>

          <div class="graph-stats" aria-live="polite">
            <span><b id="visibleCount">0</b> 个知识点</span>
            <span><b id="edgeCount">0</b> 条学习关系</span>
          </div>

          <div class="canvas-controls" aria-label="图谱视角控制">
            <button id="zoomIn" type="button" aria-label="放大">+</button>
            <button id="zoomOut" type="button" aria-label="缩小">−</button>
          </div>

          <div id="tooltip" class="node-tooltip" hidden></div>

          <footer class="site-footer">
            <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener">辽ICP备2026015252号</a>
            <span class="footer-divider"></span>
            <a href="https://www.beian.gov.cn/portal/registerSystemInfo?recordcode=21011202001337" target="_blank" rel="noopener">
              <svg class="police-icon" viewBox="0 0 20 20" aria-hidden="true"><path d="M10 2s-2.5 1.5-4 1.5V7c0 3.5 2 6.5 4 8 2-1.5 4-4.5 4-8V3.5c-1.5 0-4-1.5-4-1.5z"/></svg>
              辽公网安备21011202001337号
            </a>
          </footer>
        </section>

        <aside id="detailPanel" class="detail-panel" aria-label="知识点详情">
          <div class="panel-handle" id="panelHandle">
            <span class="panel-handle-bar"></span>
            <span class="panel-handle-text">上滑查看详情</span>
          </div>
          <div class="empty-detail" id="emptyDetail">
            <div class="orbit-icon" aria-hidden="true"><span></span><i></i><b></b></div>
            <h2>选择一个知识点</h2>
            <p>点击图中的任意节点，查看它的学习目标、前置基础和接下来会解锁的内容。</p>
            <div class="detail-tip"><span>小提示</span>颜色代表学科，高度代表年级。</div>
            <div class="scroll-hint" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="m18 10-6 6-6-6"/></svg>
              <span>点击节点后，下滑查看更多</span>
            </div>
          </div>

          <div id="nodeDetail" class="node-detail" hidden>
            <div class="detail-head">
              <button id="closeDetail" class="close-button" type="button" aria-label="关闭详情">×</button>
              <div class="topic-meta"><span id="detailSubject"></span><span id="detailGrade"></span></div>
              <h2 id="detailName"></h2>
              <p id="detailDomain"></p>
            </div>

            <div class="detail-body">
              <!-- 菜单栏 1：基础标签 -->
              <div class="menu-section">
                <button class="menu-header is-expanded" data-section="basic">
                  <span class="menu-num">01</span>
                  <span class="menu-label">基础标签</span>
                  <svg class="menu-chevron" viewBox="0 0 24 24" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
                </button>
                <div class="menu-content" id="basicSection">
                  <div class="info-grid" id="basicInfo"></div>
                </div>
              </div>

              <!-- 菜单栏 2：图谱逻辑链路 -->
              <div class="menu-section">
                <button class="menu-header is-expanded" data-section="graph">
                  <span class="menu-num">02</span>
                  <span class="menu-label">图谱逻辑链路</span>
                  <svg class="menu-chevron" viewBox="0 0 24 24" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
                </button>
                <div class="menu-content" id="graphSection">
                  <div class="graph-chain" id="graphChain"></div>
                </div>
              </div>

              <!-- 菜单栏 3：核心目标 -->
              <div class="menu-section">
                <button class="menu-header" data-section="goals">
                  <span class="menu-num">03</span>
                  <span class="menu-label">核心目标</span>
                  <svg class="menu-chevron" viewBox="0 0 24 24" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
                </button>
                <div class="menu-content" id="goalsSection" hidden>
                  <div id="coreGoals"></div>
                </div>
              </div>

              <!-- 菜单栏 4：知识内容 -->
              <div class="menu-section">
                <button class="menu-header" data-section="content">
                  <span class="menu-num">04</span>
                  <span class="menu-label">知识内容</span>
                  <svg class="menu-chevron" viewBox="0 0 24 24" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
                </button>
                <div class="menu-content" id="contentSection" hidden>
                  <div id="knowledgeContent"></div>
                </div>
              </div>

              <!-- 菜单栏 5：知识练习 -->
              <div class="menu-section">
                <button class="menu-header" data-section="practice">
                  <span class="menu-num">05</span>
                  <span class="menu-label">知识练习</span>
                  <svg class="menu-chevron" viewBox="0 0 24 24" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
                </button>
                <div class="menu-content" id="practiceSection" hidden>
                  <div class="five-steps" id="fiveSteps"></div>
                </div>
              </div>
            </div>
          </div>
        </aside>
      </main>
    </div>

    <div id="lightbox" class="lightbox" hidden>
      <button class="lightbox-close" aria-label="关闭">×</button>
      <img id="lightboxImg" src="" alt="思维导图大图" />
    </div>
    <script src="data-cn.js?v=9"></script>
    <script src="app.js?v=21"></script>
  </body>
</html>
